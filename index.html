<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏆 Mundial 2026 - Grupos y Clasificaciones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0b1a2e; color: #f0f4f8; min-height: 100vh; padding: 2rem 1.5rem; display: flex; justify-content: center; }
        .container { max-width: 1400px; width: 100%; }
        header { text-align: center; margin-bottom: 3rem; padding-bottom: 1.5rem; border-bottom: 2px solid rgba(255, 255, 255, 0.08); }
        header h1 { font-size: 3rem; font-weight: 700; letter-spacing: -0.02em; background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        header p { font-size: 1.2rem; color: #94a3b8; margin-top: 0.5rem; font-weight: 400; }
        .badge { display: inline-block; background: rgba(251, 191, 36, 0.15); color: #fbbf24; padding: 0.4rem 1.2rem; border-radius: 40px; font-size: 0.85rem; font-weight: 600; margin-top: 0.75rem; border: 1px solid rgba(251, 191, 36, 0.2); }
        .status { text-align: center; padding: 2rem; font-size: 1.2rem; color: #94a3b8; }
        .status.error { color: #f87171; }
        .status.success { color: #4ade80; }
        .groups-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
        .group-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(4px); border-radius: 24px; padding: 1.8rem 1.5rem 1.5rem; border: 1px solid rgba(255, 255, 255, 0.06); box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.6); transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .group-card:hover { transform: translateY(-4px); box-shadow: 0 30px 50px -16px rgba(0, 0, 0, 0.8); border-color: rgba(251, 191, 36, 0.15); }
        .group-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 1px solid rgba(255, 255, 255, 0.06); }
        .group-name { font-size: 1.7rem; font-weight: 700; color: #facc15; letter-spacing: -0.01em; }
        .group-flag { font-size: 1.8rem; opacity: 0.6; }
        .table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .table thead th { text-align: left; padding: 0.5rem 0.3rem; color: #94a3b8; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid rgba(255, 255, 255, 0.06); }
        .table tbody tr { border-bottom: 1px solid rgba(255, 255, 255, 0.03); transition: background 0.15s; }
        .table tbody tr:hover { background: rgba(255, 255, 255, 0.03); }
        .table tbody td { padding: 0.7rem 0.3rem; vertical-align: middle; }
        .pos { font-weight: 700; width: 30px; text-align: center; color: #cbd5e1; }
        .pos-1 { color: #fbbf24; }
        .pos-2 { color: #94a3b8; }
        .pos-3 { color: #cd7f32; }
        .team-name { font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .team-emoji { font-size: 1.2rem; }
        .stats { text-align: center; font-weight: 500; color: #e2e8f0; }
        .pts { font-weight: 700; color: #facc15; }
        footer { margin-top: 4rem; text-align: center; color: #475569; font-size: 0.85rem; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 2rem; }
        footer a { color: #94a3b8; text-decoration: none; }
        footer a:hover { color: #facc15; }
        .refresh-btn { background: #facc15; color: #0b1a2e; border: none; padding: 0.5rem 1.5rem; border-radius: 40px; font-weight: 600; cursor: pointer; margin-top: 1rem; transition: all 0.3s; }
        .refresh-btn:hover { background: #fbbf24; transform: scale(1.05); }
        .attribution { color: #64748b; font-size: 0.75rem; margin-top: 0.5rem; }
        @media (max-width: 600px) { header h1 { font-size: 2.2rem; } .groups-grid { grid-template-columns: 1fr; } .group-card { padding: 1.2rem; } .table { font-size: 0.8rem; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🏆 Mundial 2026</h1>
        <p>Clasificación de los grupos</p>
        <span class="badge">⚡ Datos en tiempo real</span>
    </header>
    <div id="groupsContainer" class="status">⏳ Cargando clasificaciones...</div>
    <footer>
        <p>Football data provided by <a href="https://www.football-data.org/" target="_blank">football-data.org</a></p>
        <p class="attribution">Proyecto de ejemplo &middot; Mundial 2026</p>
    </footer>
</div>

<script>
    const container = document.getElementById('groupsContainer');
    const API_KEY = '645ac20f7bf14b79b36c95fa2c176979';
    const API_URL = 'https://api.football-data.org/v4/competitions/2000/standings?standingType=TOTAL';
    const PROXY_URL = 'https://cors-anywhere.herokuapp.com/';

    // DATOS DE EJEMPLO (por si la API falla)
    const DATOS_EJEMPLO = [
        { name: "Grupo A", teams: [
            { name: "Argentina", flag: "🇦🇷", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Perú", flag: "🇵🇪", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Chile", flag: "🇨🇱", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Trinidad y Tobago", flag: "🇹🇹", points: 0, played: 0, won: 0, drawn: 0, lost: 0 }
        ]},
        { name: "Grupo B", teams: [
            { name: "Brasil", flag: "🇧🇷", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Colombia", flag: "🇨🇴", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Paraguay", flag: "🇵🇾", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Jamaica", flag: "🇯🇲", points: 0, played: 0, won: 0, drawn: 0, lost: 0 }
        ]},
        { name: "Grupo C", teams: [
            { name: "Francia", flag: "🇫🇷", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Países Bajos", flag: "🇳🇱", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Senegal", flag: "🇸🇳", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Ghana", flag: "🇬🇭", points: 0, played: 0, won: 0, drawn: 0, lost: 0 }
        ]},
        { name: "Grupo D", teams: [
            { name: "Inglaterra", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "España", flag: "🇪🇸", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Marruecos", flag: "🇲🇦", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Australia", flag: "🇦🇺", points: 0, played: 0, won: 0, drawn: 0, lost: 0 }
        ]},
        { name: "Grupo E", teams: [
            { name: "Alemania", flag: "🇩🇪", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Italia", flag: "🇮🇹", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Nigeria", flag: "🇳🇬", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Nueva Zelanda", flag: "🇳🇿", points: 0, played: 0, won: 0, drawn: 0, lost: 0 }
        ]},
        { name: "Grupo F", teams: [
            { name: "Portugal", flag: "🇵🇹", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Bélgica", flag: "🇧🇪", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Costa Rica", flag: "🇨🇷", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Canadá", flag: "🇨🇦", points: 0, played: 0, won: 0, drawn: 0, lost: 0 }
        ]},
        { name: "Grupo G", teams: [
            { name: "Uruguay", flag: "🇺🇾", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "México", flag: "🇲🇽", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Ecuador", flag: "🇪🇨", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Camerún", flag: "🇨🇲", points: 0, played: 0, won: 0, drawn: 0, lost: 0 }
        ]},
        { name: "Grupo H", teams: [
            { name: "Croacia", flag: "🇭🇷", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Suiza", flag: "🇨🇭", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Corea del Sur", flag: "🇰🇷", points: 0, played: 0, won: 0, drawn: 0, lost: 0 },
            { name: "Estados Unidos", flag: "🇺🇸", points: 0, played: 0, won: 0, drawn: 0, lost: 0 }
        ]}
    ];

    function renderGroups(data) {
        if (!data || data.length === 0) {
            container.innerHTML = `<div class="status">⚠️ No se encontraron datos de grupos.</div>`;
            return;
        }

        let html = `<div class="groups-grid">`;
        data.forEach(group => {
            const groupName = group.name || 'Grupo';
            const teams = group.teams || [];
            html += `
                <div class="group-card">
                    <div class="group-header">
                        <span class="group-name">${groupName}</span>
                        <span class="group-flag">🏁</span>
                    </div>
                    <table class="table">
                        <thead>
                            <tr><th>#</th><th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>Pts</th></tr>
                        </thead>
                        <tbody>
            `;
            const sorted = [...teams].sort((a, b) => b.points - a.points);
            sorted.forEach((team, index) => {
                const position = index + 1;
                let posClass = 'pos';
                if (position === 1) posClass += ' pos-1';
                else if (position === 2) posClass += ' pos-2';
                else if (position === 3) posClass += ' pos-3';
                html += `
                    <tr>
                        <td class="${posClass}">${position}</td>
                        <td class="team-name">
                            <span class="team-emoji">${team.flag || '⚽'}</span>
                            ${team.name || 'Sin nombre'}
                        </td>
                        <td class="stats">${team.played || 0}</td>
                        <td class="stats">${team.won || 0}</td>
                        <td class="stats">${team.drawn || 0}</td>
                        <td class="stats">${team.lost || 0}</td>
                        <td class="stats pts">${team.points || 0}</td>
                    </tr>
                `;
            });
            html += `</tbody></table></div>`;
        });
        html += `</div>`;
        container.innerHTML = html;
    }

    async function loadData() {
        container.innerHTML = `<div class="status">⏳ Cargando clasificaciones...</div>`;
        
        try {
            console.log('Intentando conectar con la API...');
            const response = await fetch(`${PROXY_URL}${API_URL}`, {
                headers: { 'X-Auth-Token': API_KEY }
            });
            
            console.log('Respuesta recibida:', response.status);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const data = await response.json();
            console.log('Datos recibidos:', data);
            
            if (data.standings && data.standings.length > 0) {
                const groups = data.standings.map(standing => ({
                    name: standing.group || 'Clasificación',
                    teams: standing.table.map(entry => ({
                        name: entry.team.name,
                        flag: '⚽',
                        played: entry.playedGames || 0,
                        won: entry.won || 0,
                        drawn: entry.draw || 0,
                        lost: entry.lost || 0,
                        points: entry.points || 0
                    }))
                }));
                renderGroups(groups);
                container.innerHTML += `<div class="status success" style="margin-top:1rem;">✅ Datos cargados desde football-data.org (vía proxy CORS)</div>`;
                return;
            }
            throw new Error('La API no devolvió datos de clasificación');
            
        } catch (error) {
            console.error('Error detallado:', error);
            // Si falla la API, usamos datos de ejemplo
            renderGroups(DATOS_EJEMPLO);
            container.innerHTML += `
                <div class="status" style="margin-top:1rem;">
                    ⚠️ Usando datos de ejemplo. La API no está disponible.
                    <br><br>
                    <button class="refresh-btn" onclick="loadData()">🔄 Reintentar</button>
                    <br><br>
                    <small style="color:#64748b;">
                        Error: ${error.message}
                        <br>
                        Si ves este mensaje, abre <a href="https://cors-anywhere.herokuapp.com/" target="_blank" style="color:#94a3b8;">https://cors-anywhere.herokuapp.com/</a> 
                        y haz clic en "Request temporary access".
                    </small>
                </div>
            `;
        }
    }

    loadData();
</script>
</body>
</html>
